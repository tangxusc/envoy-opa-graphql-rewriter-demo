version: "1"

listen_addr: "0.0.0.0:3002"
dev_mode: true
graphql_path: "/query"

execution_config:
  file:
    path: "/config/config.json"

headers:
  all:
    request:
      - op: "propagate"
        named: "x-user-id"

events:
  providers:
    kafka:
      - id: "demo-kafka"
        brokers:
          - "kafka:9092"
