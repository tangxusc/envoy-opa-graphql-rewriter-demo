services:
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    depends_on:
      authz-server:
        condition: service_started
      graphql-server:
        condition: service_started
    networks:
      - demo-net

  authz-server:
    build:
      context: ./authz-server
      dockerfile: Dockerfile
    networks:
      - demo-net

  graphql-server:
    build:
      context: ./graphql-server
      dockerfile: Dockerfile
    networks:
      - demo-net

networks:
  demo-net:
    driver: bridge
